<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arytmetyka</title>
</head>
<body>
    <form action="arytmetyka.php" method="post">
        <label for="a">A: </label>
        <input type="number" name="a" id="a"></br>
        <label for="b">B:</label>
        <input type="number" name="b" id="b"></br>
        <label for="o">Operacja Arytmetyczna</label>
        <select name="o" id="o">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>
        <button type="submit">Oblicz</button>
    </form>
</body>
</html>
